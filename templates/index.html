<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Transaction Sync</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 460px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #1a1a2e; }
    p.subtitle { color: #666; font-size: 0.9rem; margin-bottom: 28px; }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #connect-btn { background: #635bff; color: white; margin-bottom: 12px; }
    #sync-btn    { background: #24b47e; color: white; display: none; }
    button:not(:disabled):hover { opacity: 0.88; }

    #status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    #status.success { background: #d4edda; color: #155724; }
    #status.error   { background: #f8d7da; color: #721c24; }
    #status.info    { background: #d1ecf1; color: #0c5460; }

    .account-info {
      margin-top: 16px;
      padding: 14px;
      background: #f8f9ff;
      border-radius: 8px;
      border: 1px solid #e0e0ff;
      display: none;
    }
    .account-info p { font-size: 0.85rem; color: #444; margin-bottom: 4px; }
    .account-info strong { color: #1a1a2e; }

    a.sheet-link {
      display: inline-block;
      margin-top: 10px;
      color: #635bff;
      font-weight: 600;
      text-decoration: none;
    }
    a.sheet-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bank Transaction Sync</h1>
    <p class="subtitle">Connect your bank account and sync transactions to Google Sheets.</p>

    <button id="connect-btn">Connect Bank Account</button>
    <button id="sync-btn">Sync Transactions to Google Sheets</button>

    <div class="account-info" id="account-info">
      <p>Connected: <strong id="account-label">—</strong></p>
      <p>Account ID: <strong id="account-id-display">—</strong></p>
    </div>

    <div id="status"></div>
  </div>

  <script>
    const stripe = Stripe("{{ stripe_publishable_key }}");
    let linkedAccountId = null;

    function showStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = type;
      el.style.display = "block";
    }

    document.getElementById("connect-btn").addEventListener("click", async () => {
      const btn = document.getElementById("connect-btn");
      btn.disabled = true;
      btn.textContent = "Opening bank link…";
      showStatus("Creating session…", "info");

      try {
        const res = await fetch("/create-session", { method: "POST" });
        const { client_secret, error } = await res.json();
        if (error) throw new Error(error);

        const { financialConnectionsSession, error: stripeError } =
          await stripe.collectFinancialConnectionsAccounts({ clientSecret: client_secret });

        if (stripeError) throw new Error(stripeError.message);

        const accounts = financialConnectionsSession.accounts;
        if (!accounts || accounts.length === 0) throw new Error("No accounts were linked.");

        // Use the first linked account
        const account = accounts[0];
        linkedAccountId = account.id;

        document.getElementById("account-label").textContent =
          account.display_name || account.institution_name || "Unknown bank";
        document.getElementById("account-id-display").textContent = account.id;
        document.getElementById("account-info").style.display = "block";

        document.getElementById("sync-btn").style.display = "block";
        showStatus("Bank account linked! Click Sync to pull transactions.", "success");
      } catch (err) {
        showStatus("Error: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Connect Bank Account";
      }
    });

    document.getElementById("sync-btn").addEventListener("click", async () => {
      if (!linkedAccountId) return;
      const btn = document.getElementById("sync-btn");
      btn.disabled = true;
      btn.textContent = "Syncing…";
      showStatus("Fetching transactions and writing to Google Sheets…", "info");

      try {
        const res = await fetch("/sync", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account_id: linkedAccountId }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Sync failed");

        const statusEl = document.getElementById("status");
        statusEl.innerHTML = `${data.message} <br><a class="sheet-link" href="${data.spreadsheet_url}" target="_blank">Open Google Sheet →</a>`;
        statusEl.className = "success";
        statusEl.style.display = "block";
      } catch (err) {
        showStatus("Error: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Sync Transactions to Google Sheets";
      }
    });
  </script>
</body>
</html>
