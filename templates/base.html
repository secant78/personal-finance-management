<!DOCTYPE html>
<html lang="en">
<head>

  <title>{% block title %}Personal Finance Management{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <span class="logo">Personal Finance</span>
    <nav>

  <main>
    {% block content %}{% endblock %}

</body>
</html>
